<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Wedding Invitation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            /* SHU YERDAN RANGLARNI O'ZGARTIRISHINGIZ MUMKIN */
            --primary-color: #2b3a8c; /* Asosiy rang (To'q ko'k) */
            --accent-gold: #d4af37;   /* Oltin rang */
            --bg-light: #f9faff;      /* Orqa fon rangi */
            --text-dark: #333;
        }

        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg-light);
            scroll-behavior: smooth;
        }

        /* FON GULLARI: Har bir mijoz uchun alohida rasm qo'yishingiz mumkin */
        .floral-bg {
            background-image: url('flowers_bg.png'); /* Gulli fon rasmi */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: top center;
        }

        /* 1. ELEGANT KONVERT */
        #envelope {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--primary-color);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .seal-container { text-align: center; cursor: pointer; animation: pulse 2s infinite; }
        .seal-container img { width: 120px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }

        /* 2. ASOSIY SAHIFA DIZAYNI */
        #content { display: none; text-align: center; position: relative; }

        .main-card {
            max-width: 500px; margin: 0 auto; background: rgba(255, 255, 255, 0.95);
            padding: 50px 20px; border: 1px solid var(--accent-gold);
            box-shadow: 0 10px 50px rgba(0,0,0,0.05);
            position: relative; overflow: hidden;
        }

        /* Oltin hoshiya (Border) */
        .main-card::before {
            content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid var(--accent-gold); pointer-events: none;
        }

        .couple-icon { width: 100px; margin-bottom: 20px; opacity: 0.8; }
        .names { font-family: 'Playfair Display', serif; font-size: 3.2rem; color: var(--primary-color); margin: 10px 0; }
        
        .date-section {
            border-top: 1px solid var(--accent-gold);
            border-bottom: 1px solid var(--accent-gold);
            display: inline-block; padding: 15px 40px; margin: 25px 0;
            color: var(--primary-color); font-weight: 600;
        }

        .invitation-text { 
            font-family: 'Playfair Display', serif; font-style: italic; 
            line-height: 1.8; color: #555; font-size: 1.15rem; padding: 0 15px;
        }

        /* TUGMALAR (Xarita va RSVP) */
        .btn {
            display: block; width: 85%; max-width: 280px; margin: 12px auto;
            padding: 15px; border-radius: 5px; text-decoration: none;
            font-weight: 600; border: 1px solid var(--accent-gold);
            transition: 0.3s; font-size: 0.9rem;
        }
        .btn-map { background: white; color: var(--primary-color); }
        .btn-map:hover { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        /* TAYMER */
        .timer-box { margin-top: 40px; padding: 30px; background: var(--primary-color); color: white; }
        .timer-grid { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .t-unit { border-bottom: 2px solid var(--accent-gold); min-width: 60px; padding-bottom: 5px; }
        .t-unit span { font-size: 1.8rem; font-weight: bold; display: block; }

        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
    </style>
</head>
<body>

    <div id="envelope">
        <div class="seal-container" onclick="openMe()">
            <img src="couple_icon.png" alt="Wedding">
            <p style="color:white; letter-spacing: 2px;">OCHISH UCHUN BOSING</p>
        </div>
    </div>

    <div id="content" class="floral-bg">
        <div style="padding: 40px 15px;">
            <div class="main-card">
                
                <img src="rings.png" class="couple-icon" data-aos="zoom-in" alt="Uzuklar">
                
                <p style="text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem;">Taklifnoma</p>
                <h1 class="names" data-aos="fade-up">Komil & ???</h1>
                
                <div class="date-section" data-aos="flip-up">
                    <span style="font-size: 2rem;">27</span><br>
                    <span>DEKABR | 2026</span>
                </div>

                <div class="invitation-text" data-aos="fade-up">
                    "Hayotimizning eng fayzli damida siz azizlarni yonimizda ko‘rishdan baxtiyormiz."
                </div>

                <div style="margin: 40px 0;">
                    <img src="restaurant_icon.png" width="40" alt="Joy">
                    <h3 style="color: var(--primary-color);">"IDEAL SS" RESTORANI</h3>
                    <a href="#" class="btn btn-map">GOOGLE MAPS</a>
                    <a href="#" class="btn btn-map">YANDEX XARITA</a>
                </div>

                <div class="timer-box" data-aos="zoom-in">
                    <p style="margin: 0;">To'yga qoldi:</p>
                    <div class="timer-grid">
                        <div class="t-unit"><span id="d">00</span><small>Kun</small></div>
                        <div class="t-unit"><span id="h">00</span><small>Soat</small></div>
                        <div class="t-unit"><span id="m">00</span><small>Min</small></div>
                    </div>
                </div>

                <div style="margin-top: 50px;">
                    <p style="font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: var(--primary-color);">Sizni kutib qolamiz!</p>
                </div>
            </div>
        </div>
    </div>

    <audio id="muzika" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        function openMe() {
            document.getElementById('envelope').style.transform = 'translateY(-100vh)';
            document.getElementById('content').style.display = 'block';
            setTimeout(() => { AOS.init({ duration: 1000, once: true }); }, 100);
            document.getElementById('muzika').play();
            setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            const diff = new Date("December 27, 2026 18:00:00").getTime() - new Date().getTime();
            if (diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            }
        }
    </script>
</body>
</html>
